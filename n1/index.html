<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n1 / 記録一覧</title>
<style>
  body { font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 16px; }
  .day-card { border: 1px solid #ccc; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; }
  .day-date { font-weight: bold; }
  .row { font-size: 0.9rem; margin: 4px 0; color: #333; }
  .empty { color: #888; text-align: center; padding: 30px 0; }
  .section { border: 1px solid #ccc; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
  .section-title { font-size: 0.75rem; font-weight: 700; color: #666; margin-bottom: 10px; }
  .score-display { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-num { font-size: 2.2rem; font-weight: 800; min-width: 50px; text-align: center; }
  #slider { flex: 1; }
  .note-input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; }
  .btn-save-score { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #06c; color: #fff; font-size: 0.95rem; }
  .score-saved { font-size: 0.78rem; color: #666; margin-top: 6px; text-align: center; min-height: 1.2em; }
</style>
</head>
<body>
  <p><a href="../">← 戻る</a></p>
  <h1>路歴（n1） / 記録一覧</h1>
  <p style="font-size:0.8rem;color:#888;">最終更新: 2026-07-11 11:28</p>

  <div id="login-gate">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div id="g_id_onload"
      data-client_id="550466095352-50h92anfullp137l4gq4gdi7ogjk0auc.apps.googleusercontent.com"
      data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin"></div>
    <p id="status">未ログイン(ログインすると記録一覧が表示されます)</p>
  </div>

  <div id="content" style="display:none;">
    <div class="section">
      <div class="section-title">スコア入力(<span id="scoreDate"></span>)</div>
      <div class="score-display">
        <div class="score-num" id="scoreNum">—</div>
        <input type="range" id="slider" min="0" max="100" value="80">
      </div>
      <input class="note-input" id="noteInput" type="text" placeholder="一言メモ(任意)">
      <button class="btn-save-score" id="btnSaveScore">保存</button>
      <div class="score-saved" id="scoreSaved"></div>
    </div>

    <p id="loadStatus">読み込み中...</p>
    <div id="list"></div>
    <p class="empty" id="emptyMsg" style="display:none;">記録はまだありません</p>
  </div>

  <script src="auth.js?v=202607111128"></script>
  <script type="module" src="app.js?v=202607101832"></script>
</body>
</html>
