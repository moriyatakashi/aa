<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bd / ふっかつのじゅもん解析器</title>
<style>
  :root {
    --bg: #14170f;
    --panel-bg: #1c2117;
    --border: #3a4234;
    --text: #eeeeee;
    --text-dim: #9aa590;
    --accent: #6cf;
    --accent-text: #0c1220;
    --mono: "SF Mono", "Consolas", "Menlo", monospace;
    --error-bg: #3a1c1e;
    --error-text: #ff9b9b;
    --ok: #8fd18f;
    --ng: #ff9b9b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif; max-width: 640px; margin: 0 auto; padding: 16px;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  a.back { font-size: 0.72rem; color: var(--text-dim); text-decoration: none; }
  a.back:hover { color: var(--text); }
  h1 { font-size: 1.1rem; margin: 10px 0 2px; }
  .lede { color: var(--text-dim); margin: 0 0 6px; font-size: 0.85rem; }
  .lede a { color: var(--accent); }
  .updated { font-size: 0.68rem; color: var(--text-dim); margin: 0 0 14px; }

  .panel {
    background: var(--panel-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.9rem; margin-bottom: 1rem;
  }
  .panel h2 {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--text-dim); margin: 0 0 0.6rem;
  }

  input#password-input {
    width: 100%; font-family: var(--mono); font-size: 14px;
    padding: 0.5rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text);
  }
  .toolbar { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
  button {
    font: inherit; padding: 0.4rem 0.8rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel-bg); color: var(--text);
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  #error {
    font-size: 0.85rem; color: var(--error-text);
  }
  #error:not(:empty) {
    background: var(--error-bg); padding: 0.5rem 0.7rem; border-radius: 6px; margin-top: 0.6rem;
  }

  .validity { font-weight: 700; margin-bottom: 0.6rem; }
  .validity--ok { color: var(--ok); }
  .validity--ng { color: var(--ng); }

  .field-row {
    display: flex; gap: 0.6rem; padding: 4px 0; border-bottom: 1px dotted var(--border);
    font-size: 0.88rem;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label { color: var(--text-dim); width: 8.5em; flex-shrink: 0; }
  .field-value { word-break: break-all; }

  #steps summary { cursor: pointer; color: var(--text-dim); font-size: 0.8rem; }
  #steps-body {
    font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-all;
    color: var(--text-dim); margin-top: 0.5rem; line-height: 1.6;
  }
</style>
</head>
<body>
<a class="back" href="../../">← 戻る</a>
<h1>路歴（bd） / ふっかつのじゅもん解析器</h1>
<p class="lede">
  FC版ドラゴンクエスト1の「ふっかつのじゅもん」からステータス情報を解析します。
  (<a href="https://musemyuzu.com/programming/fukkatsu-mechanism/" target="_blank" rel="noopener">元Notebook: ミューズの情報教室</a>)
</p>
<p class="updated">更新: 2026-07-19 JST</p>

<div class="panel">
  <h2>ふっかつのじゅもん</h2>
  <input type="text" id="password-input" spellcheck="false" autocomplete="off">
  <div class="toolbar">
    <button id="btn-decode" class="primary" type="button">解析する</button>
  </div>
  <div id="error"></div>
</div>

<div class="panel" id="result" style="display:none;">
  <h2>ステータス</h2>
  <div id="validity"></div>
  <div id="fields"></div>
</div>

<div class="panel">
  <details id="steps">
    <summary>計算過程を表示</summary>
    <div id="steps-body"></div>
  </details>
</div>

<script type="module" src="app.js?v=202607191300"></script>
</body>
</html>
