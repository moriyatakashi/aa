<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bc / CASL II シミュレータ</title>
<style>
  :root {
    --bg: #14170f;
    --panel-bg: #1c2117;
    --border: #3a4234;
    --text: #eeeeee;
    --text-dim: #9aa590;
    --accent: #6cf;
    --accent-text: #0c1220;
    --mono: "SF Mono", "Consolas", "Menlo", monospace;
    --error-bg: #3a1c1e;
    --error-text: #ff9b9b;
    --console-bg: #05070a;
    --console-text: #9be89b;
    --pr-highlight: #4a4420;
    --breakpoint: #ff6b57;
  }
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif; max-width: 960px; margin: 0 auto; padding: 16px;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  a.back { font-size: 0.72rem; color: var(--text-dim); text-decoration: none; }
  a.back:hover { color: var(--text); }
  h1 { font-size: 1.1rem; margin: 10px 0 2px; }
  .lede { color: var(--text-dim); margin: 0 0 6px; font-size: 0.85rem; }
  .lede a { color: var(--accent); }
  .updated { font-size: 0.68rem; color: var(--text-dim); margin: 0 0 14px; }

  .layout {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
    gap: 1rem;
    align-items: start;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem;
    margin-bottom: 1rem;
  }
  .panel h2 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    margin: 0 0 0.6rem;
  }

  textarea#source {
    width: 100%; height: 320px;
    font-family: var(--mono); font-size: 13px; line-height: 1.5;
    padding: 0.6rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); resize: vertical; tab-size: 4;
  }

  .toolbar { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
  button {
    font: inherit; padding: 0.4rem 0.8rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel-bg); color: var(--text);
    cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  .errors { margin-top: 0.6rem; font-family: var(--mono); font-size: 12.5px; }
  .errors .error-line {
    background: var(--error-bg); color: var(--error-text);
    padding: 0.25rem 0.5rem; border-radius: 4px; margin-bottom: 0.25rem; cursor: pointer;
  }

  .regs {
    display: grid; grid-template-columns: repeat(4, auto 1fr);
    gap: 0.3rem 0.6rem; font-family: var(--mono); align-items: center;
  }
  .regs label { color: var(--text-dim); text-align: right; }
  .regs output {
    padding: 0.15rem 0.4rem; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); min-width: 3.5em; text-align: right;
  }

  .memview {
    display: grid; grid-template-columns: auto repeat(4, 1fr);
    gap: 0.3rem 0.6rem; font-family: var(--mono); align-items: center;
  }
  .memview label { color: var(--text-dim); }
  .memview output {
    padding: 0.15rem 0.4rem; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); min-width: 3.5em; text-align: right;
  }

  .radix-toggle { margin: 0.6rem 0; display: flex; gap: 0.9rem; font-size: 0.85rem; color: var(--text-dim); }
  .status-line { margin-top: 0.6rem; font-size: 0.85rem; color: var(--text-dim); }

  .console-box {
    background: var(--console-bg); color: var(--console-text);
    font-family: var(--mono); font-size: 13px; padding: 0.6rem; border-radius: 6px;
    height: 130px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  .listing {
    margin-top: 1rem; font-family: var(--mono); font-size: 12.5px;
    max-height: 420px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px;
  }
  .listing-line { display: flex; gap: 0.5rem; padding: 1px 0.5rem; white-space: pre; cursor: default; }
  .listing-line.has-addr { cursor: pointer; }
  .listing-line.pr { background: var(--pr-highlight); }
  .listing-line .addr { color: var(--text-dim); width: 4.5em; flex-shrink: 0; }
  .listing-line.breakpoint .addr { color: var(--breakpoint); font-weight: bold; }
  .listing-line .addr::before { content: "  "; }
  .listing-line.breakpoint .addr::before { content: "● "; color: var(--breakpoint); }
</style>
</head>
<body>
<a class="back" href="../../">← 戻る</a>
<h1>路歴（bc） / CASL II シミュレータ</h1>
<p class="lede">
  COMET II 仮想機械上で CASL II プログラムをアセンブル・実行します。
  (<a href="https://www.officedaytime.com/dcaslj/" target="_blank" rel="noopener">仕様参考: officedaytime.com</a>)
</p>
<p class="updated">更新: 2026-07-18 JST</p>

<div class="layout">
  <div class="panel">
    <h2>ソース</h2>
    <textarea id="source" spellcheck="false"></textarea>
    <div class="toolbar">
      <button id="btn-assemble" class="primary" type="button">アセンブル</button>
      <button id="btn-run" type="button" disabled>実行</button>
      <button id="btn-step" type="button" disabled>ステップ</button>
      <button id="btn-pause" type="button" disabled>一時停止</button>
      <button id="btn-reset" type="button" disabled>リセット</button>
      <button id="btn-clear-bp" type="button" disabled>ブレークポイント解除</button>
    </div>
    <div class="status-line" id="status">ソースを編集して「アセンブル」を押してください。</div>
    <div class="errors" id="errors"></div>
  </div>

  <div class="panel">
    <h2>レジスタ</h2>
    <div class="radix-toggle">
      <label><input type="radio" name="radix" value="hex" checked /> 16進</label>
      <label><input type="radio" name="radix" value="unsigned" /> 10進(符号なし)</label>
      <label><input type="radio" name="radix" value="signed" /> 10進(符号付き)</label>
    </div>
    <div class="regs" id="regs"></div>

    <h2 style="margin-top: 1rem">コンソール (IN/OUT)</h2>
    <div class="console-box" id="console"></div>

    <h2 style="margin-top: 1rem">メモリ</h2>
    <div class="toolbar" style="margin-top: 0">
      <label for="mem-addr" style="align-self: center; color: var(--text-dim)">アドレス(16進)</label>
      <input
        type="text"
        id="mem-addr"
        value="0000"
        maxlength="4"
        style="font-family: var(--mono); width: 5em; text-transform: uppercase"
      />
      <button id="btn-mem-show" type="button">表示</button>
    </div>
    <div class="memview" id="memview" style="margin-top: 0.5rem"></div>
  </div>
</div>

<div class="panel">
  <h2>プログラムリスト (アドレスをクリックでブレークポイント切替)</h2>
  <div class="listing" id="listing"></div>
</div>

<script type="module" src="app.js?v=202607181300"></script>
</body>
</html>
