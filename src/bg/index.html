<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../common/config.js?v=202607160712"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bg / YML定義エディタ</title>
<link rel="stylesheet" href="../common/base.css?v=202607141900">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 1.5rem;
    background: #fafafa;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    margin-top: 0;
    color: #333;
  }
  .lede {
    font-size: 0.95rem;
    color: #666;
    margin: 1rem 0 2rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }
  }
  .panel {
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1rem;
  }
  .panel h2 {
    margin-top: 0;
    font-size: 1rem;
    color: #555;
    border-bottom: 1px solid #eee;
    padding-bottom: 0.5rem;
  }
  
  .category-block {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 1rem;
    margin-bottom: 1rem;
    background: #f9f9f9;
  }
  .category-header {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .category-header input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid #bbb;
    border-radius: 3px;
  }
  .category-header button {
    padding: 0.5rem 0.75rem;
    background: #c33;
    color: white;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .category-header button:hover {
    background: #a22;
  }
  
  .item-block {
    border-left: 3px solid #0066cc;
    padding-left: 1rem;
    margin-left: 0.5rem;
    margin-bottom: 0.75rem;
    padding: 0.75rem;
    background: white;
    border-radius: 3px;
    border: 1px solid #ddd;
    border-left: 3px solid #0066cc;
  }
  .item-row {
    display: grid;
    grid-template-columns: 1fr 2fr 1.5fr;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    align-items: center;
  }
  .item-row label {
    font-size: 0.75rem;
    color: #666;
    font-weight: 500;
  }
  .item-row input {
    padding: 0.4rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    font-size: 0.85rem;
  }
  .item-remove {
    padding: 0.4rem 0.6rem;
    background: #e0e0e0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .item-remove:hover {
    background: #d0d0d0;
  }
  
  .add-btn {
    padding: 0.5rem 1rem;
    background: #0066cc;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .add-btn:hover {
    background: #0052a3;
  }
  
  .button-group {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  
  #preview {
    width: 100%;
    min-height: 500px;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #f9f9f9;
    font-family: "Monaco", "Menlo", monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
  }
  
  #status {
    margin-top: 1rem;
    padding: 0.5rem;
    background: #f0f0f0;
    border-radius: 4px;
    font-size: 0.85rem;
    color: #666;
  }
  .success {
    background: #d4edda;
    color: #155724;
  }
  .error {
    background: #f8d7da;
    color: #721c24;
  }
</style>
</head>
<body>
  <p><a href="../../">← 戻る</a></p>
  <div class="container">
    <div class="eyebrow">ロレキ内部メモ</div>
    <h1>bg / YML定義エディタ</h1>
    <p class="lede">nav.yml のような YML を フォームで構築。カテゴリ・アイテムを追加して、リアルタイム YAML プレビュー。</p>

    <div class="layout">
      <div class="panel">
        <h2>フォーム</h2>
        <div id="categoriesContainer"></div>
        <button class="add-btn" id="addCategoryBtn">+ カテゴリを追加</button>
        <div class="button-group">
          <button class="add-btn" id="saveBtn">保存</button>
          <button class="add-btn" style="background: #666;" id="clearBtn">クリア</button>
        </div>
        <div id="status"></div>
      </div>

      <div class="panel">
        <h2>プレビュー</h2>
        <div id="preview">（フォームに入力するとここに YAML が表示されます）</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
