<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../common/config.js?v=202607160712"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bg / YML定義エディタ</title>
<link rel="stylesheet" href="../common/base.css?v=202607141900">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 1.5rem;
    background: #fafafa;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    margin-top: 0;
    color: #333;
  }
  .lede {
    font-size: 0.95rem;
    color: #666;
    margin: 1rem 0 2rem;
  }
  .editor-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 900px) {
    .editor-panel {
      grid-template-columns: 1fr;
    }
  }
  .panel {
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1rem;
  }
  .panel h2 {
    margin-top: 0;
    font-size: 1rem;
    color: #555;
    border-bottom: 1px solid #eee;
    padding-bottom: 0.5rem;
  }
  textarea {
    width: 100%;
    height: 400px;
    padding: 0.75rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: "Monaco", "Menlo", monospace;
    font-size: 0.85rem;
    resize: vertical;
  }
  #preview {
    width: 100%;
    min-height: 400px;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #f9f9f9;
    font-family: "Monaco", "Menlo", monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
  }
  .button-group {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  button {
    padding: 0.5rem 1rem;
    background: #0066cc;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:hover {
    background: #0052a3;
  }
  button.secondary {
    background: #666;
  }
  button.secondary:hover {
    background: #444;
  }
  #status {
    margin-top: 1rem;
    padding: 0.5rem;
    background: #f0f0f0;
    border-radius: 4px;
    font-size: 0.85rem;
    color: #666;
  }
  .error {
    color: #c33;
  }
  .success {
    color: #3a3;
  }
</style>
</head>
<body>
  <p><a href="../../">← 戻る</a></p>
  <div class="container">
    <div class="eyebrow">ロレキ内部メモ</div>
    <h1>bg / YML定義エディタ</h1>
    <p class="lede">YML フォーマットのデータを定義・保存。リアルタイムプレビュー付き。ローカルストレージに自動保存されます。</p>

    <div class="editor-panel">
      <div class="panel">
        <h2>入力</h2>
        <textarea id="editor" placeholder="YAML形式で入力してください..."></textarea>
        <div class="button-group">
          <button id="saveBtn">保存</button>
          <button id="clearBtn" class="secondary">クリア</button>
        </div>
        <div id="status"></div>
      </div>

      <div class="panel">
        <h2>プレビュー / 検証</h2>
        <div id="preview">（プレビューはここに表示されます）</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
