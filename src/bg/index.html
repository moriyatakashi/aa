<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../common/config.js?v=202607160712"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bg / YML定義エディタ</title>
<link rel="stylesheet" href="../common/base.css?v=202607141900">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 1.5rem;
    background: #fafafa;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
  }
  h1 {
    margin-top: 0;
    color: #333;
  }
  .lede {
    font-size: 0.95rem;
    color: #666;
    margin: 1rem 0 2rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }
  }
  .panel {
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1rem;
  }
  .panel h2 {
    margin-top: 0;
    font-size: 1rem;
    color: #555;
    border-bottom: 1px solid #eee;
    padding-bottom: 0.5rem;
  }
  
  .category-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .category-item {
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    background: #f0f0f0;
    border-radius: 3px;
    cursor: pointer;
    border-left: 3px solid #ddd;
    transition: all 0.2s;
  }
  .category-item:hover {
    background: #e0e0e0;
  }
  .category-item.active {
    background: #0066cc;
    color: white;
    border-left-color: #0052a3;
  }
  
  .details-panel {
    display: none;
  }
  .details-panel.active {
    display: block;
  }
  
  .category-form {
    margin-bottom: 1.5rem;
  }
  .category-form label {
    display: block;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 0.3rem;
    font-weight: 500;
  }
  .category-form input {
    width: 100%;
    padding: 0.5rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    box-sizing: border-box;
  }
  
  .items-section {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #ddd;
  }
  .items-section h3 {
    margin-top: 0;
    font-size: 0.95rem;
    color: #555;
  }
  
  .item-block {
    background: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 3px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .item-block label {
    display: block;
    font-size: 0.75rem;
    color: #666;
    margin: 0.5rem 0 0.3rem 0;
    font-weight: 500;
  }
  .item-block input {
    width: 100%;
    padding: 0.4rem;
    border: 1px solid #bbb;
    border-radius: 3px;
    box-sizing: border-box;
    font-size: 0.9rem;
  }
  .item-remove {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.4rem;
    background: #e0e0e0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .item-remove:hover {
    background: #d0d0d0;
  }
  
  .button-group {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }
  button {
    flex: 1;
    padding: 0.5rem;
    background: #0066cc;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:hover {
    background: #0052a3;
  }
  button.secondary {
    background: #666;
  }
  button.secondary:hover {
    background: #444;
  }
  
  #status {
    padding: 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    margin-top: 1rem;
  }
  .success {
    background: #d4edda;
    color: #155724;
  }
  .error {
    background: #f8d7da;
    color: #721c24;
  }
  .loading {
    background: #d1ecf1;
    color: #0c5460;
  }
</style>
</head>
<body>
  <p><a href="../../">← 戻る</a></p>
  <div class="container">
    <div class="eyebrow">ロレキ内部メモ</div>
    <h1>bg / YML定義エディタ</h1>
    <p class="lede">nav.yml を編集。左からカテゴリを選んで、右側で詳細編集。</p>

    <div class="layout">
      <!-- 左：カテゴリリスト -->
      <div class="panel">
        <h2>カテゴリ</h2>
        <ul class="category-list" id="categoryList"></ul>
        <button id="addCategoryBtn" style="width: 100%; margin-top: 1rem;">+ カテゴリを追加</button>
      </div>

      <!-- 右：詳細編集 -->
      <div class="panel">
        <h2>詳細</h2>
        <div id="detailsContainer"></div>
        <div id="status"></div>
        <div class="button-group">
          <button id="saveBtn">保存（GitHub に push）</button>
          <button id="reloadBtn" class="secondary">再読み込み</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
