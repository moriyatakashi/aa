<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../common/config.js?v=202607160712"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n1 / 記録一覧</title>
<link rel="stylesheet" href="../common/base.css?v=202607141905">
<style>
  /* ba-8(2026-07-20): このページ固有の色をローカル変数化(共有色はbase.cssのvar()を参照) */
  :root {
    --row-text: #dddddd;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --row-text: #2d3122;
    }
  }
  .day-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; }
  .day-date { font-weight: bold; }
  .row { font-size: 0.9rem; margin: 4px 0; color: var(--row-text); }
  .empty { color: var(--ink-soft); text-align: center; padding: 30px 0; }
  .score-display { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-num { font-size: 2.2rem; font-weight: 800; min-width: 50px; text-align: center; }
  #slider { flex: 1; }
  .note-input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; margin-bottom: 10px; background: var(--input-bg); color: var(--ink); }
  .btn-save-score { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 0.95rem; }
  .score-saved { font-size: 0.78rem; color: var(--ink-soft); margin-top: 6px; text-align: center; min-height: 1.2em; }
</style>
</head>
<body>
  <p><a href="../../">← 戻る</a></p>
  <h1>路歴（n1） / 記録一覧</h1>
  <p id="lastUpdated" style="font-size:0.8rem;color:var(--ink-soft);">最終更新: 2026-07-16 07:48 JST</p>

<!-- LOGIN_GATE:START -->
  <div id="login-gate">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div id="g_id_onload"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <script>document.getElementById('g_id_onload').setAttribute('data-client_id', window.AA_GOOGLE_CLIENT_ID);</script>
    <div class="g_id_signin"></div>
    <p id="status">未ログイン(ログインすると記録一覧が表示されます)</p>
  </div>
<!-- LOGIN_GATE:END -->

  <div id="content" style="display:none;">
    <div class="section">
      <div class="section-title">スコア入力(<span id="scoreDate"></span>)</div>
      <div class="score-display">
        <div class="score-num" id="scoreNum">—</div>
        <input type="range" id="slider" min="0" max="100" value="80">
      </div>
      <input class="note-input" id="noteInput" type="text" placeholder="一言メモ(任意)">
      <button class="btn-save-score" id="btnSaveScore">保存</button>
      <div class="score-saved" id="scoreSaved"></div>
    </div>

    <p id="loadStatus">読み込み中...</p>
    <div id="list"></div>
    <p class="empty" id="emptyMsg" style="display:none;">記録はまだありません</p>
  </div>

  <script>window.AA_AUTH_EVENT = "n1-login-success"; window.AA_PUBLIC_VIEW = true;</script>
  <script src="../common/auth.js?v=202607201000"></script>
  <script type="module" src="app.js?v=202607232103"></script>
  <script type="module">
    import { applyLastUpdated } from "../common/last-updated.js";
    applyLastUpdated("src/n1", "lastUpdated", "最終更新");
  </script>
</body>
</html>
