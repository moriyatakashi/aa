<!DOCTYPE html>

<head>

<link rel="stylesheet" href="../common/ledger.css?v=202607141900">
<style>
  /* bb固有: 分類セクションの見出し(トップページのcat-labelと同じ流儀) */
  .sec-label {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.7rem; letter-spacing: 0.12em; color: var(--ink-soft, #8b9280);
    margin: 26px 0 8px; display: flex; align-items: center; gap: 10px;
  }
  .sec-label::after { content: ""; flex: 1; height: 1px; background: #333a28; }
  .ro-banner {
    font-size: 0.75rem; color: var(--ink-soft, #8b9280);
    border: 1px dashed #556; border-radius: 8px; padding: 6px 10px; margin: 10px 0;
  }
  .bb-item { padding: 8px 0; border-bottom: 1px dotted #333; }
  .bb-item-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .bb-item-title { font-weight: 600; }
  .bb-item-sub { font-size: 0.75rem; color: var(--ink-soft, #8b9280); margin-top: 2px; }
  .bb-latest { font-size: 0.8rem; color: #bbb; margin-top: 4px; }
  .recent-row { font-size: 0.8rem; padding: 5px 0; border-bottom: 1px dotted #333; }
  .recent-row .entry-type { margin-right: 6px; }
</style>
</head>
<body>
  <p><a href="../">← 戻る</a></p>
  <div class="eyebrow">ロレキ内部メモ</div>
  <h1>路歴（bb） / ba現在形ビュー</h1>

  <div id="content">

    <div class="list-controls">
      <button type="button" class="btn-toggle-voided" id="btnToggleClosed">closedも表示</button>
    </div>

    <div id="sections"></div>

    <div class="sec-label">直近の動き</div>
    <div id="recent"></div>
