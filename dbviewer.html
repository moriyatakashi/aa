<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>roreki - db viewer</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="page.css">
</head>
<body>
  <div class="page-wrap">
    <h1>roreki <span style="font-size:1rem;opacity:0.5">db viewer</span></h1>
    <div class="row">
      <label style="color:#888;font-family:monospace;font-size:0.9rem">collection:</label>
      <input id="collection" value="map" style="width:120px">
      <label style="color:#888;font-family:monospace;font-size:0.9rem">doc:</label>
      <select id="docSelect">
        <option value="japan">japan</option>
        <option value="japan_16x16">japan_16x16</option>
        <option value="japan_backup">japan_backup</option>
      </select>
      <button class="btn" id="fetchBtn">取得</button>
    </div>
    <div class="status" id="status"></div>
    <div class="output-wrap">
      <button class="copy-btn" id="copyBtn">copy</button>
      <pre id="output">ここに結果が表示されます</pre>
    </div>
    <a href="admin.html">← admin</a>
  </div>
  <script type="module" src="dbviewer.js"></script>
</body>
</html>
